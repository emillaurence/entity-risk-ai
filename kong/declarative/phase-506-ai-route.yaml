# Phase 506 — Kong AI Gateway: /ai and /ai/sonnet route declarative configuration
#
# Uses the Kong ai-proxy plugin — the actual Kong AI Gateway feature —
# to route requests to Anthropic. This is NOT a generic proxy; the ai-proxy
# plugin handles provider routing, upstream auth, and Anthropic versioning.
#
# Two routes under a single Service:
#
#   /ai          — generic AI route (Haiku); used by agents and all non-planner calls
#   /ai/sonnet   — planner-only route (Sonnet); used exclusively by InvestigationPlanner
#
# Both routes share the same Service (anthropic-ai) and the same consumer credential,
# but each has its own ai-proxy plugin instance configured with the appropriate model.
#
# Sync to Konnect with:
#
#   export DECK_ANTHROPIC_API_KEY="sk-ant-..."
#   deck gateway sync \
#     --konnect-addr "$KONG_KONNECT_ADDR" \
#     --konnect-token "$KONG_KONNECT_TOKEN" \
#     --konnect-control-plane-name "$KONG_KONNECT_CONTROL_PLANE_NAME" \
#     kong/declarative/phase-506-ai-route.yaml
#
# Before syncing:
#   1. Set DECK_ANTHROPIC_API_KEY to your Anthropic API key in your shell.
#      The app in Kong mode does NOT send the Anthropic key — ai-proxy injects it.
#   2. Replace <YOUR_APP_KONG_API_KEY> with the key your app will use as
#      X-Kong-API-Key. This must also be set in KONG_AI_GATEWAY_API_KEY.
#
# IMPORTANT: Do NOT commit this file with real secrets filled in.
# Keep secrets in .env (gitignored) or use the DECK_* env var pattern.
#
# NOTE: The --konnect-region flag is deprecated. Always use --konnect-addr.
# decK docs: https://docs.konghq.com/deck/

_format_version: "3.0"

services:
  - name: anthropic-ai
    # Placeholder URL — the ai-proxy plugin overrides the upstream entirely.
    # Kong never connects to this address; it is required by the Service schema.
    # ai-proxy routes to https://api.anthropic.com based on provider config.
    url: http://localhost:32000
    routes:
      - name: ai-route
        paths:
          - /ai
        methods:
          - POST
        protocols:
          - https
        # strip_path: false — ai-proxy handles the upstream path internally.
        # The app sends POST /ai; ai-proxy routes to /v1/messages on Anthropic.
        strip_path: false
        plugins:
          # ── ai-proxy (Kong AI Gateway) ────────────────────────────────
          #
          # This is the Kong AI Gateway plugin. It:
          #   - Routes the request to api.anthropic.com/v1/messages
          #   - Injects x-api-key (Anthropic credential) from auth.header_value
          #   - Adds anthropic-version header from model.options
          #   - Returns the native Anthropic response to the app
          #
          # llm_format: anthropic — preserves native Anthropic request format.
          #   The app sends {"model":..., "system":..., "messages":[...]}
          #   exactly as it does in direct mode. No translation needed.
          #
          # route_type: llm/v1/chat — maps to the Anthropic Messages API.
          #
          # Plugin comparison (for reference):
          #   request-transformer    — static header/body edits (no AI, wrong tool)
          #   ai-request-transformer — uses an LLM to rewrite request CONTENT (unrelated)
          #   ai-proxy               — Kong AI Gateway provider routing (correct tool)
          - name: ai-proxy
            config:
              route_type: llm/v1/chat
              llm_format: anthropic
              auth:
                header_name: x-api-key
                # Use decK env var substitution so the key is never in this file:
                #   export DECK_ANTHROPIC_API_KEY="sk-ant-..."
                # Or replace the placeholder below (do NOT commit with real value).
                header_value: ${{ env "DECK_ANTHROPIC_API_KEY" }}
              model:
                provider: anthropic
                name: claude-haiku-4-5-20251001
                options:
                  anthropic_version: "2023-06-01"
                  max_tokens: 1024

          # ── key-auth ──────────────────────────────────────────────────
          # Validates X-Kong-API-Key sent by the application.
          # Requests without a valid key receive HTTP 401.
          - name: key-auth
            config:
              key_names:
                - x-kong-api-key
                - X-Kong-API-Key
              hide_credentials: true    # strip key before forwarding upstream

          # ── rate-limiting ─────────────────────────────────────────────
          # Conservative limit suitable for development/smoke testing.
          # Tune minute/hour values before production use.
          - name: rate-limiting
            config:
              minute: 20
              policy: local
              fault_tolerant: true      # pass through if Redis unavailable

      # ── /ai/sonnet — planner-only Sonnet route ────────────────────────
      - name: ai-sonnet-route
        paths:
          - /ai/sonnet
        methods:
          - POST
        protocols:
          - https
        strip_path: false
        plugins:
          # ── ai-proxy (Kong AI Gateway) — Sonnet model ──────────────────
          #
          # Identical plugin configuration to ai-route above, but with
          # claude-sonnet-4-6 as the model.  Only InvestigationPlanner
          # traffic is routed here (via KongAIGatewaySettings.for_planner()).
          #
          # The planner needs Sonnet for reliable structured JSON output.
          # No other call site uses this route.
          - name: ai-proxy
            config:
              route_type: llm/v1/chat
              llm_format: anthropic
              auth:
                header_name: x-api-key
                header_value: ${{ env "DECK_ANTHROPIC_API_KEY" }}
              model:
                provider: anthropic
                name: claude-sonnet-4-6
                options:
                  anthropic_version: "2023-06-01"
                  max_tokens: 1024

          # ── key-auth ──────────────────────────────────────────────────
          # Same consumer credential as /ai — no separate key needed.
          - name: key-auth
            config:
              key_names:
                - x-kong-api-key
                - X-Kong-API-Key
              hide_credentials: true

          # ── rate-limiting ─────────────────────────────────────────────
          # Tighter limit for Sonnet (more expensive per token).
          - name: rate-limiting
            config:
              minute: 10
              policy: local
              fault_tolerant: true

# ── Consumers ─────────────────────────────────────────────────────────────
# One consumer credential grants access to both /ai and /ai/sonnet.
consumers:
  - username: entity-risk-ai-app
    keyauth_credentials:
      - key: "<YOUR_APP_KONG_API_KEY>"
        # This value must match KONG_AI_GATEWAY_API_KEY in your .env file.
        # Generate a strong random string, e.g.:
        #   python3 -c "import secrets; print(secrets.token_urlsafe(32))"
