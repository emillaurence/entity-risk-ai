# Phase 507 — Kong MCP Gateway reference configuration
#
# PURPOSE
# -------
# This file is REFERENCE DOCUMENTATION only.  It is NOT a live sync target.
# Konnect Gateway Manager is the source of truth for the running configuration.
#
# Use this file to:
#   - understand the intended MCP Gateway shape before creating it in the UI
#   - perform a dry-run diff once you have the live config:
#       deck gateway diff --konnect-addr "$KONG_KONNECT_ADDR" \
#                         --konnect-token "$KONG_KONNECT_TOKEN" \
#                         --konnect-control-plane-name "$KONG_KONNECT_CONTROL_PLANE_NAME" \
#                         kong/declarative/mcp-gateway-reference.yaml
#
# DO NOT run `deck gateway sync` against this file without first reviewing the
# diff — it may not include the full live state (AI Gateway routes etc.) and
# could wipe config that is not represented here.
#
# KEY DIFFERENCES FROM PHASE 506 (AI GATEWAY)
# --------------------------------------------
# Phase 506 uses ai-proxy-advanced (Kong AI Gateway plugin) to route to Anthropic.
# Phase 507 uses ai-mcp-proxy (Kong MCP Gateway plugin) in passthrough-listener mode.
#
# | Feature           | Phase 506                     | Phase 507                        |
# |-------------------|-------------------------------|----------------------------------|
# | Plugin            | ai-proxy-advanced             | ai-mcp-proxy                     |
# | Route             | /ai, /ai/sonnet               | /mcp                             |
# | Upstream          | api.anthropic.com (injected)  | Railway FastMCP server           |
# | Format            | Anthropic Messages API        | MCP JSON-RPC                     |
# | Service URL       | localhost placeholder          | real upstream URL                |
#
# Both plugins require AI Gateway Enterprise license (same Konnect plan).
#
# Other /mcp-specific notes:
# - strip_path: false — Kong forwards /mcp to upstream as-is.
# - Methods include both GET and POST (MCP streamable HTTP uses both).
# - No upstream credential injection — Railway MCP handles its own auth.
#
# THREE URLS (reminders)
# ----------------------
# KONG_KONNECT_ADDR   — https://au.api.konghq.com  (management API; NOT traffic)
# KONG_PROXY_URL      — https://<id>.au.kong.tech   (where smoke tests hit)
# KONG_MCP_UPSTREAM_URL — https://entity-risk-ai-production.up.railway.app/mcp
#
# FORMAT
# ------
# decK 1.x / Konnect format_version 3.0
# See: https://docs.konghq.com/deck/latest/

_format_version: "3.0"
_konnect:
  control_plane_name: entity-risk-ai

# ---------------------------------------------------------------------------
# Consumers
# ---------------------------------------------------------------------------
# The existing entity-risk-ai-app consumer (created in Phase 506) can hold a
# second keyauth credential for MCP traffic, OR you can create a dedicated
# MCP consumer.  Using the same consumer is simpler; a dedicated one gives
# per-consumer rate limiting granularity.
#
# Option A — add a credential to the existing consumer (recommended for 507):
consumers:
- username: entity-risk-ai-app
  keyauth_credentials:
  # Phase 506 AI Gateway credential (already present in live config — keep it)
  - key: <KONG_AI_GATEWAY_API_KEY>     # replace with actual value from live dump
  # Phase 507 MCP Gateway credential (new — set KONG_MCP_GATEWAY_API_KEY to this value)
  - key: <KONG_MCP_GATEWAY_API_KEY>    # replace with actual value from your .env

# ---------------------------------------------------------------------------
# Services
# ---------------------------------------------------------------------------
services:
- name: mcp-upstream-service
  # Full upstream URL including path.  strip_path: false on the route means
  # Kong appends the full request path to this base URL — which resolves to:
  #   https://entity-risk-ai-production.up.railway.app/mcp
  url: https://entity-risk-ai-production.up.railway.app/mcp
  connect_timeout: 60000
  read_timeout: 60000
  write_timeout: 60000
  retries: 3
  enabled: true

  routes:
  - name: mcp-route
    paths:
    - /mcp
    methods:
    - GET
    - POST
    # strip_path: false — the /mcp path is forwarded to the upstream as-is.
    # If strip_path were true, Kong would strip /mcp and the upstream would
    # receive a bare / — breaking the Railway MCP endpoint.
    strip_path: false
    preserve_host: false
    protocols:
    - https
    path_handling: v0
    https_redirect_status_code: 426
    request_buffering: true
    response_buffering: true
    regex_priority: 0

    plugins:
    # ── Plugin 1: key-auth ────────────────────────────────────────────────────
    # Runs first.  Validates X-Kong-API-Key before the MCP proxy layer runs.
    # Unauthenticated requests are rejected here with 401 — never reach ai-mcp-proxy.
    - name: key-auth
      enabled: true
      config:
        # Accept the key in the header (primary) or query string (fallback).
        # Hide credentials so the key is stripped before forwarding upstream.
        key_names:
        - x-kong-api-key
        - X-Kong-API-Key
        key_in_header: true
        key_in_query: true
        key_in_body: false
        hide_credentials: true
        anonymous: null
        run_on_preflight: true
      protocols:
      - http
      - https

    # ── Plugin 2: ai-mcp-proxy ────────────────────────────────────────────────
    # Runs second (after key-auth passes).  Kong's native MCP protocol proxy.
    # Requires AI Gateway Enterprise license (same plan as Phase 506 ai-proxy-advanced).
    # Available on Konnect Serverless.  Requires Kong Gateway 3.12+.
    #
    # passthrough-listener mode:
    #   - Understands MCP JSON-RPC at the protocol level
    #   - Provides tool-call observability in Konnect AI Gateway Analytics
    #   - Upstream URL stays in the Kong Service config (not here)
    #   - server.tag is NOT set here — that field is only for listener aggregation mode
    - name: ai-mcp-proxy
      enabled: true
      config:
        mode: passthrough-listener
        max_request_body_size: 1048576    # 1 MB default; increase for large tool payloads
        logging:
          log_audits: true               # record which MCP tools were called
          log_payloads: false            # opt-in only — logs full request/response bodies
          log_statistics: true           # feeds Konnect AI Gateway Analytics
      protocols:
      - http
      - https
