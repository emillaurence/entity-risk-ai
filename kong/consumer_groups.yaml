# Phase 509 — Kong MCP ACL: Consumer Groups
#
# PURPOSE
# -------
# This file is REFERENCE DOCUMENTATION only.  It is NOT a live sync target.
# Konnect Gateway Manager is the source of truth for the running configuration.
#
# This file defines the consumer and consumer group structure required for
# Phase 509 role-based MCP tool access control.
#
# ROLE MAPPING
# ------------
# App role              → Kong Consumer Group   → MCP tool access
# jr_risk_analyst       → jr-analyst            → restricted (see acl_policy.yaml)
# sr_risk_analyst       → sr-analyst            → all tools allowed
#
# SHARED KEY LIMITATION
# ---------------------
# The current app uses a single KONG_MCP_GATEWAY_API_KEY for all users.
# With a shared key, Kong maps every request to the same consumer and
# cannot distinguish between jr and sr analysts.
#
# To enforce per-role ACL you MUST create separate consumers with separate
# API keys, one per role.  The app would need to send the key matching the
# signed-in user's role.
#
# Future identity propagation path:
#   1. App mints a short-lived JWT with role claim after login
#   2. JWT is sent as Bearer token to Kong
#   3. Kong jwt plugin validates the claim → maps to consumer group
#   4. ACL plugin enforces tool allowlist for that group
#
# For Phase 509, document this limitation and use per-role keys manually.
#
# CONSUMER KEY CONFIGURATION
# --------------------------
# Set these env vars on the app side for per-role keys:
#   KONG_MCP_ACL_JR_API_KEY=<key for jr-analyst consumer>
#   KONG_MCP_ACL_SR_API_KEY=<key for sr-analyst consumer>
#
# The app selects the key based on the signed-in user's role.
# See: src/app/policy.py KONG_CONSUMER_GROUP_MAP
#
# DECK USAGE
# ----------
# Dry-run diff (never sync without reviewing):
#   deck gateway diff --konnect-addr "$KONG_KONNECT_ADDR" \
#                     --konnect-token "$KONG_KONNECT_TOKEN" \
#                     --konnect-control-plane-name "$KONG_KONNECT_CONTROL_PLANE_NAME" \
#                     kong/consumer_groups.yaml
#
# FORMAT
# ------
# decK 1.x / Konnect format_version 3.0

_format_version: "3.0"
_konnect:
  control_plane_name: entity-risk-ai

# ---------------------------------------------------------------------------
# Consumer Groups
# ---------------------------------------------------------------------------
# Create these groups in Konnect UI:
#   Gateway Manager → Consumers → Consumer Groups → + New Consumer Group

consumer_groups:
- name: jr-analyst
- name: sr-analyst

# ---------------------------------------------------------------------------
# Consumers
# ---------------------------------------------------------------------------
# Each consumer maps to one role.  The consumer is assigned to a group.
# Kong uses the group membership to apply ACL rules from acl_policy.yaml.
#
# Step-by-step (Konnect UI):
#   1. Gateway Manager → Consumers → + New Consumer
#      username: jr-analyst-app
#   2. Open the consumer → Credentials → Key Auth → + New Credential
#      key: <value of KONG_MCP_ACL_JR_API_KEY>
#   3. Open the consumer → Consumer Groups → + Add to Group → jr-analyst
#   Repeat for sr-analyst-app / KONG_MCP_ACL_SR_API_KEY / sr-analyst

consumers:
- username: jr-analyst-app
  groups:
  - name: jr-analyst
  keyauth_credentials:
  - key: <KONG_MCP_ACL_JR_API_KEY>    # replace with actual key from .env

- username: sr-analyst-app
  groups:
  - name: sr-analyst
  keyauth_credentials:
  - key: <KONG_MCP_ACL_SR_API_KEY>    # replace with actual key from .env
